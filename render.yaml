services:
  - type: web
    name: anemia-backend
    env: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    plan: free
    healthCheckPath: "/health"
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: SEED_DEFAULT_USERS
        value: true
      - key: RESET_SEED_USER_PASSWORDS
        value: true
      - key: ACCESS_TOKEN_EXPIRE_HOURS
        value: 8

  - type: static
    name: anemia-frontend
    rootDir: frontend
    buildCommand: ""
    staticPublishPath: "/"
